<!DOCTYPE html><meta charset="UTF-8"><p id=s>loading...</p><script>
(async()=>{
let p=new URLSearchParams(location.search),m=p.get("m"),i=p.get("v");
if(!m||!i)return s.textContent="ERROR - Missing queries! (Don't visit this page like a walk in park, ok?)";
try{
let t=await (await fetch("https://example.com/list.txt")).text(),
l=t.split("\n"),k=m+"-"+i,u=null;
for(let x of l)if((x=x.trim()).startsWith(k+"=")){u=x.split("=")[1].trim();break}
if(!u)return s.textContent="ERROR - FILE NOT FOUND";location.href=u;
}catch(e){
console.error(e);s.textContent="ERROR - FAILED TO DOWNLOAD : "+e;}
})();
</script>
